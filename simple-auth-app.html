<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Auth App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>

    <script>
        // Simple state management
        let state = {
            user: null,
            token: null,
            currentPage: 'login',
            loading: false,
            error: '',
            success: '',
            students: []
        };

        // DOM manipulation
        function render() {
            const app = document.getElementById('app');
            
            if (state.user) {
                app.innerHTML = `
                    <div class="min-h-screen bg-gray-100">
                        <nav class="bg-white shadow-lg">
                            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <div class="flex justify-between h-16">
                                    <div class="flex items-center">
                                        <h1 class="text-xl font-bold text-blue-600">Student Management</h1>
                                    </div>
                                    <div class="flex items-center space-x-4">
                                        <span class="text-gray-700">Welcome, ${state.user.name}</span>
                                        <button onclick="logout()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                                            Logout
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </nav>

                        <div class="container mx-auto p-8">
                            <h2 class="text-3xl font-bold mb-8">Dashboard</h2>
                            
                            ${state.error ? `<div class="bg-red-100 text-red-700 p-3 rounded mb-4">${state.error}</div>` : ''}
                            ${state.success ? `<div class="bg-green-100 text-green-700 p-3 rounded mb-4">${state.success}</div>` : ''}

                            <!-- Add Student Form -->
                            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                                <h3 class="text-xl font-semibold mb-4">Add New Student</h3>
                                <form onsubmit="addStudent(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <input type="text" id="studentName" placeholder="Name" class="px-4 py-2 border rounded-lg" required>
                                    <input type="number" id="studentAge" placeholder="Age" class="px-4 py-2 border rounded-lg" required>
                                    <input type="text" id="studentCourse" placeholder="Course" class="px-4 py-2 border rounded-lg" required>
                                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                                        Add Student
                                    </button>
                                </form>
                            </div>

                            <!-- Students List -->
                            <div class="bg-white rounded-lg shadow-md p-6">
                                <h3 class="text-xl font-semibold mb-4">Students (${state.students.length})</h3>
                                
                                ${state.loading ? `
                                    <div class="text-center py-8">
                                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                                        <p class="mt-4 text-gray-600">Loading...</p>
                                    </div>
                                ` : state.students.length === 0 ? `
                                    <div class="text-center py-8">
                                        <p class="text-gray-500">No students yet. Add your first student!</p>
                                    </div>
                                ` : `
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        ${state.students.map(student => `
                                            <div class="bg-gray-50 rounded-lg p-6">
                                                <div class="flex justify-between items-start mb-4">
                                                    <div>
                                                        <h4 class="font-semibold text-lg">${student.name}</h4>
                                                        <p class="text-gray-600">Age: ${student.age}</p>
                                                        <p class="text-gray-600">Course: ${student.course}</p>
                                                    </div>
                                                    <div class="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">
                                                        ${student.name.charAt(0).toUpperCase()}
                                                    </div>
                                                </div>
                                                <button onclick="deleteStudent('${student._id}')" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700">
                                                    Delete
                                                </button>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
                loadStudents();
            } else {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center">
                        <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
                            <h2 class="text-2xl font-bold text-center mb-6">
                                ${state.currentPage === 'login' ? 'Sign In' : 'Create Account'}
                            </h2>
                            
                            ${state.error ? `<div class="bg-red-100 text-red-700 p-3 rounded mb-4">${state.error}</div>` : ''}
                            ${state.success ? `<div class="bg-green-100 text-green-700 p-3 rounded mb-4">${state.success}</div>` : ''}
                            
                            <form onsubmit="handleSubmit(event)" class="space-y-4">
                                ${state.currentPage === 'signup' ? `
                                    <input type="text" id="name" placeholder="Full Name" class="w-full px-4 py-2 border rounded-lg" required>
                                ` : ''}
                                <input type="email" id="email" placeholder="Email" class="w-full px-4 py-2 border rounded-lg" required>
                                <input type="password" id="password" placeholder="Password" class="w-full px-4 py-2 border rounded-lg" required>
                                ${state.currentPage === 'signup' ? `
                                    <input type="password" id="confirmPassword" placeholder="Confirm Password" class="w-full px-4 py-2 border rounded-lg" required>
                                ` : ''}
                                
                                <button type="submit" disabled={state.loading} class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50">
                                    ${state.loading ? 'Processing...' : (state.currentPage === 'login' ? 'Sign In' : 'Sign Up')}
                                </button>
                            </form>
                            
                            <p class="text-center mt-4 text-gray-600">
                                ${state.currentPage === 'login' ? "Don't have an account? " : "Already have an account? "}
                                <button onclick="togglePage()" class="text-blue-600 hover:underline">
                                    ${state.currentPage === 'login' ? 'Sign up' : 'Sign in'}
                                </button>
                            </p>
                        </div>
                    </div>
                `;
            }
        }

        // API helper function
        async function apiCall(url, options = {}) {
            const config = {
                headers: {
                    'Content-Type': 'application/json',
                    ...(state.token && { 'Authorization': `Bearer ${state.token}` })
                },
                ...options
            };

            try {
                const response = await fetch(url, config);
                const data = await response.json();
                return { response, data };
            } catch (error) {
                console.error('API Error:', error);
                return { response: null, data: { success: false, message: 'Network error' } };
            }
        }

        // Authentication functions
        async function handleSubmit(event) {
            event.preventDefault();
            state.loading = true;
            state.error = '';
            state.success = '';
            render();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = state.currentPage === 'signup' ? document.getElementById('name').value : null;
            const confirmPassword = state.currentPage === 'signup' ? document.getElementById('confirmPassword').value : null;

            if (state.currentPage === 'signup' && password !== confirmPassword) {
                state.error = 'Passwords do not match';
                state.loading = false;
                render();
                return;
            }

            const url = state.currentPage === 'login' ? '/api/auth/login' : '/api/auth/signup';
            const body = state.currentPage === 'login' ? { email, password } : { name, email, password };

            const { response, data } = await apiCall(`http://localhost:5000${url}`, {
                method: 'POST',
                body: JSON.stringify(body)
            });

            if (response && response.ok && data.success) {
                state.token = data.data.token;
                state.user = data.data.user;
                state.success = state.currentPage === 'login' ? 'Login successful!' : 'Account created successfully!';
                
                // Store in localStorage
                localStorage.setItem('token', state.token);
                localStorage.setItem('user', JSON.stringify(state.user));
                
                setTimeout(() => {
                    state.success = '';
                    render();
                }, 1500);
            } else {
                state.error = data.message || 'Authentication failed';
            }

            state.loading = false;
            render();
        }

        function logout() {
            state.token = null;
            state.user = null;
            state.students = [];
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            render();
        }

        function togglePage() {
            state.currentPage = state.currentPage === 'login' ? 'signup' : 'login';
            state.error = '';
            state.success = '';
            render();
        }

        // Student management functions
        async function loadStudents() {
            if (!state.user) return;

            state.loading = true;
            render();

            const { response, data } = await apiCall('http://localhost:5000/api/students');

            if (response && response.ok) {
                state.students = data.data || [];
            } else {
                state.error = 'Failed to load students';
            }

            state.loading = false;
            render();
        }

        async function addStudent(event) {
            event.preventDefault();
            state.error = '';
            state.success = '';
            
            const name = document.getElementById('studentName').value;
            const age = parseInt(document.getElementById('studentAge').value);
            const course = document.getElementById('studentCourse').value;

            const { response, data } = await apiCall('http://localhost:5000/api/students', {
                method: 'POST',
                body: JSON.stringify({ name, age, course })
            });

            if (response && response.ok) {
                state.success = 'Student added successfully!';
                document.getElementById('studentName').value = '';
                document.getElementById('studentAge').value = '';
                document.getElementById('studentCourse').value = '';
                loadStudents();
                
                setTimeout(() => {
                    state.success = '';
                    render();
                }, 2000);
            } else {
                state.error = data.message || 'Failed to add student';
            }

            render();
        }

        async function deleteStudent(id) {
            if (!confirm('Are you sure you want to delete this student?')) return;

            const { response, data } = await apiCall(`http://localhost:5000/api/students/${id}`, {
                method: 'DELETE'
            });

            if (response && response.ok) {
                state.success = 'Student deleted successfully!';
                loadStudents();
                
                setTimeout(() => {
                    state.success = '';
                    render();
                }, 2000);
            } else {
                state.error = data.message || 'Failed to delete student';
            }

            render();
        }

        // Initialize app
        function init() {
            // Check for existing session
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user) {
                state.token = token;
                state.user = JSON.parse(user);
            }

            render();
        }

        // Start the app
        init();
    </script>
</body>
</html>
