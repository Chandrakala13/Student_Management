<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [testResult, setTestResult] = useState('');

            // Test API connection first
            useEffect(() => {
                testAPIConnection();
            }, []);

            const testAPIConnection = async () => {
                try {
                    setTestResult('Testing API connection...');
                    const response = await fetch('http://localhost:5000/api/students');
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('API Data:', data);
                    setStudents(data.data || []);
                    setTestResult('✅ API Connected successfully!');
                } catch (err) {
                    console.error('API Error:', err);
                    setError('❌ API Connection failed: ' + err.message);
                    setTestResult('❌ API Connection failed');
                } finally {
                    setLoading(false);
                }
            };

            const handleDelete = async (id) => {
                if (confirm('Are you sure you want to delete this student?')) {
                    try {
                        const response = await fetch(`http://localhost:5000/api/students/${id}`, {
                            method: 'DELETE'
                        });
                        
                        if (response.ok) {
                            testAPIConnection(); // Reload students
                        } else {
                            setError('Delete failed');
                        }
                    } catch (err) {
                        setError('Delete error: ' + err.message);
                    }
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                            <p className="mt-4 text-gray-600">Testing API connection...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100">
                    <div className="container mx-auto p-8">
                        <h1 className="text-4xl font-bold text-center mb-8 text-blue-600">Student Management System</h1>
                        
                        {/* API Test Result */}
                        <div className={`p-4 rounded-lg mb-6 ${testResult.includes('✅') ? 'bg-green-100 border-green-400 text-green-700' : 'bg-yellow-100 border-yellow-400 text-yellow-700'}`}>
                            <h3 className="font-semibold mb-2">API Connection Status</h3>
                            <p className="text-lg">{testResult}</p>
                            {error && <p className="text-red-600 mt-2">Error: {error}</p>}
                            <button onClick={testAPIConnection} className="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                                Test Connection Again
                            </button>
                        </div>

                        {/* Students List */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {students.map(student => (
                                <div key={student._id} className="bg-white rounded-lg shadow-md p-6">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 className="text-xl font-semibold text-gray-800">{student.name}</h3>
                                            <p className="text-gray-600">Age: {student.age}</p>
                                            <p className="text-gray-600">Course: {student.course}</p>
                                        </div>
                                        <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">
                                            {student.name.charAt(0).toUpperCase()}
                                        </div>
                                    </div>
                                    <div className="flex gap-2 mt-4">
                                        <button
                                            onClick={() => handleDelete(student._id)}
                                            className="flex-1 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition-colors"
                                        >
                                            Delete
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {students.length === 0 && !loading && (
                            <div className="text-center py-12">
                                <h2 className="text-2xl font-semibold text-gray-700 mb-2">No Students Yet</h2>
                                <p className="text-gray-500">Database is empty or API connection failed</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
