<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-warning {
      background: #ffc107;
      color: #333;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    th {
      background: #667eea;
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .actions {
      display: flex;
      gap: 5px;
    }

    .actions .btn {
      padding: 8px 15px;
      font-size: 14px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .pagination button {
      padding: 8px 15px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 5px;
      cursor: pointer;
    }

    .pagination button.active {
      background: #667eea;
      color: white;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .message {
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      color: #333;
    }

    .close {
      font-size: 30px;
      cursor: pointer;
      color: #999;
    }

    .close:hover {
      color: #333;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Student Management System</h1>

    <!-- Create Student Form -->
    <div class="card">
      <h2>Add New Student</h2>
      <form id="createForm">
        <div class="form-row">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter name" required>
          </div>
          <div class="form-group">
            <label>Age</label>
            <input type="number" id="age" placeholder="Enter age" required min="1" max="150">
          </div>
          <div class="form-group">
            <label>Course</label>
            <input type="text" id="course" placeholder="Enter course" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">➕ Add Student</button>
      </form>
    </div>

    <!-- Search and List -->
    <div class="card">
      <h2>All Students</h2>
      <div id="message"></div>
      
      <div class="search-bar">
        <input type="text" id="search" placeholder="Search by name...">
        <button class="btn btn-primary" onclick="loadStudents()">🔍 Search</button>
      </div>

      <div id="loading" class="loading">Loading...</div>
      <div id="tableContainer">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Course</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentTable"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty-state" style="display: none;">
        No students found. Add one above! 🎉
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Student</h2>
        <span class="close" onclick="closeModal()">&times;</span>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="editAge" required min="1" max="150">
        </div>
        <div class="form-group">
          <label>Course</label>
          <input type="text" id="editCourse" required>
        </div>
        <button type="submit" class="btn btn-success">💾 Save Changes</button>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/students';
    let currentPage = 1;
    let totalPages = 1;
    let currentSearch = '';

    // Show message
    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.innerHTML = `<div class="message ${type}">${text}</div>`;
      setTimeout(() => msg.innerHTML = '', 3000);
    }

    // Load students
    async function loadStudents(page = 1) {
      currentPage = page;
      currentSearch = document.getElementById('search').value;
      
      document.getElementById('loading').style.display = 'block';
      document.getElementById('tableContainer').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      try {
        const url = `${API_URL}?page=${page}&limit=10&search=${encodeURIComponent(currentSearch)}`;
        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) throw new Error(data.message || 'Failed to load');

        renderTable(data.data, data.pagination);
      } catch (error) {
        showMessage(error.message, 'error');
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Render table
    function renderTable(students, pagination) {
      document.getElementById('loading').style.display = 'none';
      
      if (students.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      document.getElementById('tableContainer').style.display = 'block';
      
      const tbody = document.getElementById('studentTable');
      tbody.innerHTML = students.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.age}</td>
          <td>${s.course}</td>
          <td>${new Date(s.createdAt).toLocaleDateString()}</td>
          <td class="actions">
            <button class="btn btn-warning" onclick="openEdit('${s._id}', '${s.name}', ${s.age}, '${s.course}')">✏️ Edit</button>
            <button class="btn btn-danger" onclick="deleteStudent('${s._id}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join('');

      totalPages = pagination.totalPages;
      renderPagination();
    }

    // Render pagination
    function renderPagination() {
      const pag = document.getElementById('pagination');
      let html = `<button ${currentPage === 1 ? 'disabled' : ''} onclick="loadStudents(${currentPage - 1})">← Prev</button>`;
      
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadStudents(${i})">${i}</button>`;
      }
      
      html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="loadStudents(${currentPage + 1})">Next →</button>`;
      pag.innerHTML = html;
    }

    // Create student
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const student = {
        name: document.getElementById('name').value,
        age: parseInt(document.getElementById('age').value),
        course: document.getElementById('course').value
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(student)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Failed to create');

        showMessage('Student created successfully! 🎉');
        e.target.reset();
        loadStudents();
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    // Open edit modal
    function openEdit(id, name, age, course) {
      document.getElementById('editId').value = id;
      document.getElementById('editName').value = name;
      document.getElementById('editAge').value = age;
      document.getElementById('editCourse').value = course;
      document.getElementById('editModal').classList.add('active');
    }

    // Close modal
    function closeModal() {
      document.getElementById('editModal').classList.remove('active');
    }

    // Update student
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('editId').value;
      const student = {
        name: document.getElementById('editName').value,
        age: parseInt(document.getElementById('editAge').value),
        course: document.getElementById('editCourse').value
      };

      try {
        const response = await fetch(`${API_URL}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(student)
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Failed to update');

        showMessage('Student updated successfully! ✨');
        closeModal();
        loadStudents(currentPage);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    });

    // Delete student
    async function deleteStudent(id) {
      if (!confirm('Are you sure you want to delete this student?')) return;

      try {
        const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Failed to delete');

        showMessage('Student deleted! 🗑️');
        loadStudents(currentPage);
      } catch (error) {
        showMessage(error.message, 'error');
      }
    }

    // Search on Enter
    document.getElementById('search').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadStudents();
    });

    // Initial load
    loadStudents();
  </script>
</body>
</html>
