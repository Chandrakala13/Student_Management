<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [formData, setFormData] = useState({ name: '', age: '', course: '' });
            const [testResult, setTestResult] = useState('');

            // Load students from backend
            useEffect(() => {
                loadStudents();
            }, []);

            const loadStudents = async () => {
                try {
                    setLoading(true);
                    setError('');
                    setTestResult('Loading students...');
                    
                    const response = await fetch('http://localhost:5000/api/students');
                    console.log('Response status:', response.status);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('API Data:', data);
                    setStudents(data.data || []);
                    setTestResult('API Connected successfully!');
                } catch (err) {
                    console.error('API Error:', err);
                    setError('Failed to load students: ' + err.message);
                    setTestResult('API Connection failed');
                } finally {
                    setLoading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    setError('');
                    
                    // Validate form data
                    if (!formData.name || !formData.age || !formData.course) {
                        setError('Please fill all fields');
                        return;
                    }
                    
                    const response = await fetch('http://localhost:5000/api/students', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            name: formData.name.trim(),
                            age: parseInt(formData.age),
                            course: formData.course.trim() 
                        })
                    });
                    
                    console.log('Create response:', response);
                    
                    if (response.ok) {
                        setFormData({ name: '', age: '', course: '' });
                        loadStudents(); // Reload students
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        setError('Failed to create student: ' + (errorData.message || 'Unknown error'));
                    }
                } catch (err) {
                    setError('Failed to create student: ' + err.message);
                    console.error('Create error:', err);
                }
            };

            const handleDelete = async (id) => {
                if (confirm('Are you sure you want to delete this student?')) {
                    try {
                        setError('');
                        const response = await fetch(`http://localhost:5000/api/students/${id}`, {
                            method: 'DELETE'
                        });
                        
                        console.log('Delete response:', response);
                        
                        if (response.ok) {
                            loadStudents(); // Reload students
                        } else {
                            setError('Failed to delete student');
                        }
                    } catch (err) {
                        setError('Failed to delete student: ' + err.message);
                        console.error('Delete error:', err);
                    }
                }
            };

            const handleInputChange = (field) => (e) => {
                setFormData(prev => ({ ...prev, [field]: e.target.value }));
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                            <p className="mt-4 text-gray-600">Loading students...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100">
                    <div className="container mx-auto p-8">
                        <h1 className="text-4xl font-bold text-center mb-8 text-blue-600">Student Management System</h1>
                        
                        {/* API Test Result */}
                        <div className={`p-4 rounded-lg mb-6 ${testResult.includes('successfully') ? 'bg-green-100 border-green-400 text-green-700' : 'bg-yellow-100 border-yellow-400 text-yellow-700'}`}>
                            <h3 className="font-semibold mb-2">API Connection Status</h3>
                            <p className="text-lg">{testResult}</p>
                            <button onClick={loadStudents} className="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                                Refresh Data
                            </button>
                        </div>

                        {error && (
                            <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                                {error}
                                <button onClick={() => setError('')} className="float-right text-red-500 hover:text-red-700">×</button>
                            </div>
                        )}

                        {/* Add Student Form */}
                        <div className="bg-white rounded-lg shadow-md p-6 mb-8">
                            <h2 className="text-2xl font-semibold mb-4">Add New Student</h2>
                            <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <input
                                    type="text"
                                    placeholder="Name"
                                    value={formData.name}
                                    onChange={handleInputChange('name')}
                                    className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required
                                />
                                <input
                                    type="number"
                                    placeholder="Age"
                                    value={formData.age}
                                    onChange={handleInputChange('age')}
                                    className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    min="1"
                                    max="150"
                                    required
                                />
                                <input
                                    type="text"
                                    placeholder="Course"
                                    value={formData.course}
                                    onChange={handleInputChange('course')}
                                    className="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    required
                                />
                                <button
                                    type="submit"
                                    className="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors"
                                >
                                    Add Student
                                </button>
                            </form>
                        </div>

                        {/* Students List */}
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <h2 className="text-2xl font-semibold mb-4">Student List ({students.length} students)</h2>
                            
                            {students.length === 0 ? (
                                <div className="text-center py-12">
                                    <div className="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1m0 0h6a2 2 0 002 2h2a2 2 0 002-2m0 0h6a2 2 0 002-2h2a2 2 0 002 2z" />
                                        </svg>
                                    </div>
                                    <h2 className="text-2xl font-semibold text-gray-700 mb-2">No Students Yet</h2>
                                    <p className="text-gray-500">Add your first student using the form above!</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {students.map(student => (
                                        <div key={student._id} className="bg-gray-50 rounded-lg p-6 border border-gray-200">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex-1">
                                                    <h3 className="text-xl font-semibold text-gray-800 mb-2">{student.name}</h3>
                                                    <div className="space-y-1">
                                                        <p className="text-gray-600">
                                                            <span className="font-medium">Age:</span> {student.age}
                                                        </p>
                                                        <p className="text-gray-600">
                                                            <span className="font-medium">Course:</span> {student.course}
                                                        </p>
                                                        {student.createdAt && (
                                                            <p className="text-sm text-gray-500">
                                                                <span className="font-medium">Added:</span> {new Date(student.createdAt).toLocaleDateString()}
                                                            </p>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-lg">
                                                    {student.name.charAt(0).toUpperCase()}
                                                </div>
                                            </div>
                                            
                                            <div className="flex gap-2 pt-4 border-t border-gray-200">
                                                <button
                                                    onClick={() => handleDelete(student._id)}
                                                    className="flex-1 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition-colors"
                                                >
                                                    Delete
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
